[pytest]
testpaths =
    testcases
    ui_cases
python_files = test_*.py
python_functions = test_*
addopts = -ra
log_cli = true
log_cli_level = INFO
markers =
    smoke: core availability checks that should run after every deployment
    regression: broader backend regression suite
    p0: highest risk test cases
    p1: important but not release-blocking in every run
    contract: API contract and response-shape checks
    permission: role and authorization checks
    device: device management checks
    ota: OTA workflow checks
    log: log query checks
    data_consistency: checks that compare API, DB, device status, and logs
    ui: Playwright UI checks
    destructive: tests that may mutate or delete data
    slow: long-running or polling-heavy cases

